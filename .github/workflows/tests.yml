name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  pest:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: teses_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=4s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=20s

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        env:
          MYSQL_TESTING_HOST: 127.0.0.1
          MYSQL_TESTING_PORT: '3307'
          MYSQL_TESTING_DATABASE: teses_test
          MYSQL_TESTING_USERNAME: root
          MYSQL_TESTING_PASSWORD: password
        run: php artisan test --compact
